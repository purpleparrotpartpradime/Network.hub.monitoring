<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SECURE_LINK</title>
    <style>
        :root { --cyan: #00f2ff; --navy: #000a1a; --dark-blue: #001a33; --bg: #00050a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--cyan); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        #main { 
            display: flex; flex-direction: column; height: 100vh; 
            padding-top: env(safe-area-inset-top); 
            padding-bottom: env(safe-area-inset-bottom);
        }

        #header { 
            background: var(--navy); border-bottom: 2px solid var(--dark-blue); 
            padding: 15px; text-align: center; font-size: 12px; letter-spacing: 2px;
        }

        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }

        #box { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        
        .line { 
            display: flex; padding: 15px; background: var(--navy); 
            border-top: 1px solid var(--dark-blue); position: sticky; bottom: 0; z-index: 100;
        }

        input { background: transparent; border: none; color: var(--cyan); font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #port-in { border-bottom: 1px solid var(--cyan); text-align: center; margin-bottom: 20px; width: 80%; }
        
        button { 
            background: var(--cyan); color: #000; border: none; padding: 15px 30px; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 2px;
        }

        .msg-wrap { margin-bottom: 12px; border-left: 1px solid var(--dark-blue); padding-left: 10px; }
        .sender-id { font-size: 10px; color: #555; display: block; margin-bottom: 2px; }
        .msg-text { font-size: 14px; line-height: 1.4; }
        .self { border-left: 1px solid var(--cyan); }
        .sys { color: #444; font-style: italic; font-size: 11px; text-align: center; }
    </style>
</head>
<body>

<div id="main">
    <div id="header">LINK_ID: <span id="my-id-display">NOT_CONNECTED</span></div>

    <div id="setup">
        <p style="font-size: 11px; margin-bottom: 20px;">ASSIGN UNIQUE PORT ID</p>
        <input type="number" id="port-in" placeholder="0000" autocomplete="off">
        <button onclick="initialize()">INITIATE LINK</button>
    </div>

    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="TYPE TRANSMISSION..." autocomplete="off" autocapitalize="none">
        </div>
    </div>
</div>

<script src="https://unpkg.com"></script>
<script>
    let peer, conn, myPort;
    const box = document.getElementById('box');

    function initialize() {
        myPort = document.getElementById('port-in').value;
        if (!myPort) return;

        // Start Peer with the chosen ID
        peer = new Peer('node-net-' + myPort);

        peer.on('open', (id) => {
            document.getElementById('my-id-display').textContent = myPort;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            addLog("SECURE TUNNEL OPENED");

            // Attempt to link to the same port globally
            const request = peer.connect('node-net-' + myPort);
            if (request) {
                conn = request;
                setupLink();
            }
        });

        peer.on('connection', (c) => {
            conn = c;
            setupLink();
        });

        peer.on('error', (err) => {
            if (err.type === 'id-taken') {
                alert("CRITICAL ERROR: ID " + myPort + " IS ALREADY ACTIVE ON NETWORK.");
                location.reload();
            } else {
                addLog("ERROR: " + err.type);
            }
        });
    }

    function setupLink() {
        conn.on('data', data => addMsg(myPort, data, false)); // We use same Port ID for room verification
        conn.on('open', () => addLog("PEER HANDSHAKE COMPLETE"));
    }

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg-wrap' + (isSelf ? ' self' : '');
        div.innerHTML = `
            <span class="sender-id">ID: ${id}</span>
            <span class="msg-text">${text}</span>
        `;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'sys';
        d.textContent = ">> " + t;
        box.appendChild(d);
    }

    document.getElementById('msg-in').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && conn) {
            const m = e.target.value;
            if (!m) return;
            conn.send(m);
            addMsg(myPort, m, true);
            e.target.value = '';
        }
    });

    // iOS Keyboard fix - scroll to bottom on focus
    document.getElementById('msg-in').addEventListener('focus', () => {
        setTimeout(() => box.scrollTop = box.scrollHeight, 300);
    });
</script>
</body>
</html>
