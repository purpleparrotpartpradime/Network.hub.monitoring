<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- These make it look like a real app when saved to home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos</title>
    
    <style>
        :root { --cyan: #00f2ff; --navy: #000a1a; --dark-blue: #001a33; --bg: #00050a; --safe-top: env(safe-area-inset-top); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--cyan); font-family: 'Courier New', monospace; height: 100%; width: 100vw; overflow: hidden; position: fixed; -webkit-user-select: none; }
        #main { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
        #header { background: var(--navy); border-bottom: 2px solid var(--dark-blue); padding: 15px; text-align: center; font-size: 12px; flex-shrink: 0; letter-spacing: 2px; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .line { display: flex; padding: 15px; background: var(--navy); border-top: 1px solid var(--dark-blue); flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { background: transparent; border: none; color: var(--cyan); font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #port-in { border: none; border-bottom: 1px solid var(--cyan); text-align: center; margin-bottom: 30px; width: 80%; padding: 10px; border-radius: 0; }
        .btn-row { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        button { flex: 1; background: var(--cyan); color: #000; border: none; padding: 20px 0; font-weight: bold; border-radius: 4px; text-transform: uppercase; cursor: pointer; }
        .btn-alt { background: var(--dark-blue); color: var(--cyan); border: 1px solid var(--cyan); }
        .msg-wrap { margin-bottom: 15px; border-left: 2px solid var(--dark-blue); padding-left: 12px; }
        .sender-id { font-size: 10px; color: #555; display: block; margin-bottom: 4px; }
        .msg-text { font-size: 14px; line-height: 1.5; color: #fff; word-break: break-all; }
        .self { border-left: 2px solid var(--cyan); }
        .sys { color: #444; font-size: 11px; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>
<div id="main">
    <div id="header">LINK_STATUS: <span id="my-id-display">OFFLINE</span></div>
    <div id="setup">
        <input type="number" id="port-in" placeholder="ENTER_ID_CODE" pattern="\d*">
        <div class="btn-row">
            <button onclick="initialize(false)">HOST</button>
            <button onclick="initialize(true)" class="btn-alt">JOIN</button>
        </div>
    </div>
    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="ENCRYPT_MSG..." autocomplete="off" autocapitalize="none">
        </div>
    </div>
</div>

<!-- FIXED THE SCRIPT LINK BELOW -->
<script src="https://unpkg.com"></script>

<script>
    let peer, conn, myPort;
    const box = document.getElementById('box');
    const main = document.getElementById('main');

    // Fix for mobile keyboard pushing UI
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            main.style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }

    function initialize(isLinkOnly) {
        myPort = document.getElementById('port-in').value;
        if (!myPort) return;
        
        // Host ID is node-1234, Guest ID is random
        const nodeId = isLinkOnly ? 'guest-' + Math.floor(Math.random()*9999) : 'node-' + myPort;
        
        peer = new Peer(nodeId, {
            config: {'iceServers': [
                { url: 'stun:stun.l.google.com:19302' },
                { url: 'stun:stun1.l.google.com:19302' }
            ]},
            debug: 1
        });

        peer.on('open', (id) => {
            document.getElementById('my-id-display').textContent = isLinkOnly ? "JOINING..." : "HOSTING: " + myPort;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            
            if (isLinkOnly) {
                // Guests try to connect to the Host's ID
                conn = peer.connect('node-' + myPort);
                setupLink();
            }
        });

        peer.on('connection', (c) => { 
            conn = c; 
            setupLink(); 
        });

        peer.on('error', (err) => { 
            if(err.type === 'id-taken') { alert("ID ALREADY ACTIVE"); location.reload(); }
            else { console.error(err); }
        });
    }

    function setupLink() {
        conn.on('open', () => {
            addLog("ENCRYPTION_ESTABLISHED");
            document.getElementById('my-id-display').textContent = "SECURE_LINK";
        });
        conn.on('data', data => addMsg("REMOTE", data, false));
        conn.on('close', () => addLog("LINK_TERMINATED"));
    }

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg-wrap' + (isSelf ? ' self' : '');
        div.innerHTML = `<span class="sender-id">${id}</span><span class="msg-text">${text}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'sys';
        d.textContent = ">> " + t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-in').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && conn && e.target.value.trim() !== "") {
            conn.send(e.target.value);
            addMsg("YOU", e.target.value, true);
            e.target.value = '';
        }
    });
</script>
</body>
</html>
