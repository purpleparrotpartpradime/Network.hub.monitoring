<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SYS_HUB</title>
    <link rel="stylesheet" href="https://jsdelivr.net" />
    <style>
        :root { --blue: #00f2ff; --bg: #000; --safe-top: env(safe-area-inset-top); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--blue); font-family: monospace; height: 100vh; overflow: hidden; }
        #container { display: flex; flex-direction: column; height: 100vh; padding-top: var(--safe-top); }
        nav { display: flex; background: #111; border-bottom: 1px solid var(--blue); flex-shrink: 0; }
        .tab { flex: 1; padding: 15px 0; text-align: center; font-size: 11px; text-transform: uppercase; cursor: pointer; border-right: 1px solid #222; }
        .tab.active { background: var(--blue); color: #000; font-weight: bold; }
        .panel { display: none; flex: 1; overflow: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .panel.active { display: flex; flex-direction: column; }
        #term-out, #chat-box { white-space: pre-wrap; font-size: 13px; line-height: 1.4; flex: 1; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #222; padding: 12px 0; flex-shrink: 0; }
        input { background: transparent; border: none; color: var(--blue); font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #map { height: 100%; width: 100%; filter: invert(1) hue-rotate(180deg); }
        .btn { background: var(--blue); color: #000; border: none; padding: 10px; font-weight: bold; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="container">
    <nav>
        <div class="tab active" onclick="tabs('term')">Console</div>
        <div class="tab" onclick="tabs('sat')">Sat-View</div>
        <div class="tab" onclick="tabs('net')">Net-Logs</div>
        <div class="tab" onclick="tabs('msg')">Messages</div>
    </nav>

    <div id="term" class="panel active">
        <div id="term-out">READY.</div>
        <div class="input-line"><span>> </span><input type="text" id="cmd" spellcheck="false" autocomplete="off" autocapitalize="none"></div>
    </div>

    <div id="sat" class="panel"><div id="map"></div></div>

    <div id="net" class="panel"><div id="log-feed"></div></div>

    <div id="msg" class="panel">
        <div id="setup">
            <input type="number" id="port" placeholder="PORT_ID" style="border: 1px solid var(--blue); text-align: center; padding: 10px; width:80%;">
            <button class="btn" onclick="initP2P()">CONNECT</button>
        </div>
        <div id="chat-ui" style="display:none; flex-direction:column; height:100%;">
            <div id="chat-box"></div>
            <div class="input-line"><span>MSG> </span><input type="text" id="chat-in" autocapitalize="none"></div>
        </div>
    </div>
</div>

<script src="https://jsdelivr.net"></script>
<script src="https://jsdelivr.net"></script>

<script>
    const termOut = document.getElementById('term-out');
    const cmdIn = document.getElementById('cmd');
    let map, peer, conn;

    const commands = {
        'help': 'scan, dig [url], status, clear',
        'status': () => `NET: ${navigator.onLine?'UP':'DOWN'}\nCORES: ${navigator.hardwareConcurrency}`,
        'clear': () => { termOut.innerHTML = ''; return ''; },
        'scan': async () => {
            const r = await fetch('https://ipapi.co');
            const d = await r.json();
            return `IP: ${d.ip}\nLOC: ${d.city}, ${d.country_name}\nISP: ${d.org}`;
        },
        'dig': async (args) => {
            if(!args[0]) return "ERR: URL REQUIRED";
            const r = await fetch(`https://dns.google{args[0]}`);
            const d = await r.json();
            return d.Answer ? d.Answer.map(a => `[${a.type}] ${a.data}`).join('\n') : "NXDOMAIN";
        }
    };

    cmdIn.addEventListener('keydown', async (e) => {
        if(e.key === 'Enter') {
            const [c, ...a] = cmdIn.value.trim().toLowerCase().split(' ');
            print(`> ${cmdIn.value}`, '#fff');
            cmdIn.value = '';
            if(commands[c]) {
                const res = typeof commands[c] === 'function' ? await commands[c](a) : commands[c];
                if(res) print(res);
            }
            document.getElementById('term').scrollTop = document.getElementById('term').scrollHeight;
        }
    });

    function print(t, c) {
        const d = document.createElement('div');
        d.style.color = c || 'inherit';
        d.textContent = t;
        termOut.appendChild(d);
    }

    function tabs(id) {
        document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'sat') loadSat();
    }

    function loadSat() {
        if(!map && window.L) {
            map = L.map('map', {zoomControl: false}).setView([0,0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.getCurrentPosition(p => {
                map.setView([p.coords.latitude, p.coords.longitude], 14);
            });
        }
    }

    function initP2P() {
        const p = document.getElementById('port').value;
        if(!p || !window.Peer) return;
        peer = new Peer('ops-node-' + p);
        peer.on('open', () => {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
        });
        peer.on('connection', (c) => { 
            conn = c; 
            conn.on('data', d => addChat("REMOTE", d, "var(--blue)"));
        });
        const out = peer.connect('ops-node-' + p);
        if(out) { 
            conn = out; 
            conn.on('data', d => addChat("REMOTE", d, "var(--blue)"));
        }
    }

    document.getElementById('chat-in').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && conn) {
            conn.send(e.target.value);
            addChat("YOU", e.target.value, "#fff");
            e.target.value = '';
        }
    });

    function addChat(u, m, c) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        const clean = m.replace(/(badword1|badword2)/gi, '***');
        d.innerHTML = `<span style="color:${c}">[${u}]</span> ${clean}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    // Net-Logs
    const feed = document.getElementById('log-feed');
    setInterval(() => {
        const d = document.createElement('div');
        d.style.fontSize = '11px';
        d.textContent = `[${new Date().toLocaleTimeString()}] TRACE: ${Math.random().toString(16).slice(2,10)}`;
        feed.prepend(d);
        if(feed.childElementCount > 20) feed.lastChild.remove();
    }, 3000);
</script>
</body>
</html>
