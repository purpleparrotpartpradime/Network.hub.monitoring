<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos</title>
    <style>
        :root { --blue: #0088ff; --dark-grid: #001a33; --bg: #00040a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: "SF Mono", "Menlo", monospace; height: 100%; width: 100%; overflow: hidden; position: fixed; }

        /* Scene Layering */
        .scene { position: fixed; inset: 0; z-index: -1; background: var(--bg); overflow: hidden; }
        
        /* The Grid: Acts as the "Physical" Guide */
        .grid-base {
            position: absolute; inset: -50px;
            background-image: 
                linear-gradient(var(--dark-grid) 3px, transparent 3px),
                linear-gradient(90deg, var(--dark-grid) 3px, transparent 3px);
            background-size: 80px 80px;
        }

        /* Waves moving THROUGH the grid lines */
        .wave-h, .wave-v {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--blue), #fff, var(--blue), transparent);
            box-shadow: 0 0 15px var(--blue);
            mix-blend-mode: screen; /* Makes it look like it's inside the line */
        }

        .wave-h { height: 3px; width: 150px; animation: travelH 4s infinite cubic-bezier(0.45, 0, 0.55, 1); }
        .wave-v { width: 3px; height: 150px; background: linear-gradient(0deg, transparent, var(--blue), #fff, var(--blue), transparent); animation: travelV 5s infinite cubic-bezier(0.45, 0, 0.55, 1); }

        @keyframes travelH {
            0% { left: -200px; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        @keyframes travelV {
            0% { top: -200px; opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* Interface Overlay */
        #main { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top); }
        #header { background: rgba(0, 5, 15, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--blue); padding: 16px 22px; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: var(--blue); letter-spacing: 2px; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch; }

        .line { background: rgba(0, 0, 0, 0.8); border-top: 1px solid var(--blue); padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { background: transparent; border: none; color: #fff; font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #room-id { border: 1px solid var(--blue); background: rgba(0,0,0,0.5); text-align: center; margin-bottom: 30px; width: 100%; max-width: 260px; padding: 14px; color: #fff; border-radius: 0; }
        button { background: var(--blue); color: #fff; border: none; padding: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 260px; text-transform: uppercase; letter-spacing: 1px; }

        .msg { margin-bottom: 20px; border-left: 2px solid var(--dark-grid); padding-left: 14px; }
        .who { font-size: 10px; color: var(--blue); margin-bottom: 4px; font-weight: bold; }
        .txt { font-size: 15px; color: #d0e0ff; line-height: 1.5; }
        .self { border-left-color: var(--blue); }
        .log { font-size: 10px; color: #002244; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
<div class="scene">
    <div class="grid-base"></div>
    <!-- Waves aligned exactly to the 80px grid positions -->
    <div class="wave-h" style="top: 80px; animation-delay: 0s;"></div>
    <div class="wave-h" style="top: 320px; animation-delay: 1.2s;"></div>
    <div class="wave-h" style="top: 560px; animation-delay: 2.5s;"></div>
    <div class="wave-v" style="left: 160px; animation-delay: 0.5s;"></div>
    <div class="wave-v" style="left: 400px; animation-delay: 1.8s;"></div>
    <div class="wave-v" style="left: 720px; animation-delay: 3.1s;"></div>
</div>

<div id="main">
    <div id="header" onclick="reboot()">
        <span>PHOBOS</span>
        <span id="status">STATUS</span>
    </div>
    <div id="setup">
        <input type="text" id="room-id" placeholder="CHANNEL_ID" autocomplete="off" spellcheck="false">
        <button onclick="boot()">Connect</button>
    </div>
    <div id="chat-ui">
        <div id="box" style="display: flex; flex-direction: column;"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="ICN Message..." autocomplete="off">
        </div>
    </div>
</div>

<script type="module">
    import {joinRoom} from 'https://esm.run';
    let room, send, taps = 0;
    const status = document.getElementById('status');
    const box = document.getElementById('box');

    window.reboot = () => { if (++taps >= 3) location.reload(); setTimeout(() => taps = 0, 2000); };

    window.boot = () => {
        const id = document.getElementById('room-id').value.trim();
        if (!id) return;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        status.textContent = "ACTIVE";

        room = joinRoom({appId: 'phobos-icn-protocol'}, id);
        const [sendMessage, receiveMessage] = room.makeAction('chat');
        send = sendMessage;

        room.onPeerJoin(peerId => addLog(`Handshake accepted: ${peerId.slice(0,4)}`));
        receiveMessage((data, peerId) => addMsg(`ICN_${peerId.slice(0,4)}`, data, false));

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                send(e.target.value);
                addMsg("ICN_LOCAL", e.target.value, true);
                e.target.value = '';
            }
        };
    };

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg' + (isSelf ? ' self' : '');
        div.innerHTML = `<div class="who">${id}</div><div class="txt">${text}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'log';
        d.textContent = t;
        box.appendChild(d);
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('main').style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
