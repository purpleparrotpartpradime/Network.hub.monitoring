<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Frutiger Aero Communication System (FACS)</title>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.2); --border: rgba(255, 255, 255, 0.5); }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #004a99; font-family: "Segoe UI", "Tahoma", sans-serif; }
        
        #renderCanvas { position: fixed; inset: 0; z-index: -1; }
        
        #main { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }
        
        #header { 
            width: 100%; height: 65px; flex-shrink: 0;
            background: url('https://githubusercontent.com') no-repeat center;
            background-size: contain; border-bottom: 1px solid var(--border); backdrop-filter: blur(12px);
        }

        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; }
        .glass-panel { 
            background: var(--glass); backdrop-filter: blur(30px); border: 1px solid var(--border);
            border-radius: 25px; padding: 30px; width: 85%; max-width: 340px; text-align: center;
            box-shadow: inset 0 0 25px rgba(255,255,255,0.4), 0 15px 45px rgba(0,0,0,0.3);
        }

        input { 
            width: 90%; background: rgba(255,255,255,0.15); border: 1px solid var(--border);
            padding: 14px; border-radius: 12px; color: white; outline: none; margin-bottom: 12px; font-size: 16px;
        }

        button { 
            background: linear-gradient(#7abcff, #4096ee); color: white; border: 1px solid white;
            padding: 15px 35px; border-radius: 40px; font-weight: bold; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4); text-transform: uppercase; letter-spacing: 1px;
        }

        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; -webkit-overflow-scrolling: touch; }

        .bubble-msg { 
            max-width: 75%; padding: 15px 20px; border-radius: 25px;
            background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(35px) saturate(180%);
            border: 1px solid var(--border); color: white; position: relative;
            box-shadow: inset 0 12px 12px rgba(255,255,255,0.25), 0 8px 20px rgba(0,0,0,0.15);
        }
        .bubble-msg.self { align-self: flex-end; background: rgba(0, 136, 255, 0.25); border-color: #55b6ff; }
        .sender { font-size: 11px; font-weight: bold; color: #e0f7ff; margin-bottom: 5px; text-transform: uppercase; }

        #footer { 
            padding: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border); padding-bottom: calc(20px + env(safe-area-inset-bottom));
        }
    </style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="main">
    <div id="header"></div>
    <div id="setup">
        <div class="glass-panel">
            <input type="text" id="id-in" placeholder="CHANNEL ID" autocomplete="off">
            <input type="text" id="name-in" placeholder="DISPLAY NAME" autocomplete="off">
            <button onclick="requestSensors()">Allow Gyroscopic Data</button>
        </div>
    </div>
    <div id="chat-ui">
        <div id="box"></div>
        <div id="footer">
            <input type="text" id="msg-in" placeholder="Type a message..." autocomplete="off">
        </div>
    </div>
</div>

<script type="module">
    import { joinRoom } from 'https://esm.run';

    const canvas = document.getElementById('renderCanvas');
    const ctx = canvas.getContext('2d');
    let room, send, myName, tiltX = 0, tiltY = 0;
    let particles = [];
    let lastMsg = "FACS";

    window.requestSensors = () => {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(res => {
                if (res === 'granted') window.addEventListener('deviceorientation', handleTilt);
            }).catch(console.error);
        } else {
            window.addEventListener('deviceorientation', handleTilt);
        }
        boot();
    };

    function handleTilt(e) {
        tiltX = e.gamma / 25; 
        tiltY = e.beta / 25;  
    }

    function initScene() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<10; i++) particles.push(new Bubble());
    }

    class Bubble {
        constructor() {
            this.reset();
            this.y = Math.random() * canvas.height;
        }
        reset() {
            this.r = 35 + Math.random() * 55;
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + this.r;
            this.speed = 0.8 + Math.random() * 1.5;
        }
        draw() {
            this.y -= this.speed;
            this.x += tiltX * 6; 
            if (this.y < -this.r) this.reset();

            ctx.save();
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
            ctx.clip();
            
            // Real-time Text Reflection
            ctx.fillStyle = "rgba(255,255,255,0.15)";
            ctx.font = "italic bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText(lastMsg.substring(0, 15), this.x, this.y + 5);
            
            // Liquid Surface Highlight
            let grad = ctx.createRadialGradient(this.x - this.r/2.5, this.y - this.r/2.5, 2, this.x, this.y, this.r);
            grad.addColorStop(0, "rgba(255,255,255,0.7)");
            grad.addColorStop(0.4, "rgba(255,255,255,0.1)");
            grad.addColorStop(1, "rgba(0,160,255,0.25)");
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
        }
    }

    function drawWater() {
        const h = canvas.height;
        const w = canvas.width;
        ctx.fillStyle = "rgba(0, 140, 255, 0.4)";
        ctx.beginPath();
        ctx.moveTo(0, h);
        
        let waterLine = h - (h * 0.2); // Bottom 5th
        for(let i=0; i<=w; i+=15) {
            let y = waterLine + Math.sin(i * 0.008 + Date.now() * 0.0025) * 12;
            y += (tiltY * 30); // Gyro Slosh
            ctx.lineTo(i, y);
        }
        ctx.lineTo(w, h);
        ctx.fill();
    }

    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        let sky = ctx.createLinearGradient(0,0,0,canvas.height);
        sky.addColorStop(0, "#0072ff");
        sky.addColorStop(1, "#00c6ff");
        ctx.fillStyle = sky;
        ctx.fillRect(0,0,canvas.width, canvas.height);
        
        particles.forEach(p => p.draw());
        drawWater();
        requestAnimationFrame(animate);
    }

    window.boot = () => {
        const id = document.getElementById('id-in').value.trim();
        myName = document.getElementById('name-in').value.trim() || 'Guest';
        if (!id) return;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';

        room = joinRoom({appId: 'facs-protocol-v1'}, id);
        const [sendMsg, recvMsg] = room.makeAction('chat');
        send = sendMsg;

        recvMsg((data) => {
            addMsg(data.name, data.text, false);
            lastMsg = data.text; 
        });

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const text = e.target.value;
                send({ name: myName, text: text });
                addMsg(myName, text, true);
                lastMsg = text; 
                e.target.value = '';
            }
        };
    };

    function addMsg(name, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'bubble-msg' + (isSelf ? ' self' : '');
        div.innerHTML = `<div class="sender">${name}</div><div>${text}</div>`;
        document.getElementById('box').appendChild(div);
        document.getElementById('box').scrollTop = document.getElementById('box').scrollHeight;
    }

    window.addEventListener('resize', initScene);
    initScene();
    animate();
</script>
</body>
</html>
