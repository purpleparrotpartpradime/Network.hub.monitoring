<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos</title>
    <style>
        :root { --blue: #0070ff; --dark: #001020; --bg: #00050a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: "SF Mono", "Menlo", monospace; height: 100%; width: 100%; overflow: hidden; position: fixed; }

        .scene { position: fixed; inset: 0; z-index: -1; background: var(--bg); overflow: hidden; }
        
        .grid-base {
            position: absolute; inset: -100px;
            background-image: 
                linear-gradient(var(--dark) 2px, transparent 2px),
                linear-gradient(90deg, var(--dark) 2px, transparent 2px);
            background-size: 80px 80px;
            opacity: 0.8;
        }

        /* Moving Light Pulses */
        .pulse-h, .pulse-v {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--blue), transparent);
            box-shadow: 0 0 20px var(--blue);
            opacity: 0;
        }

        .pulse-h { height: 2px; width: 200px; animation: moveH 4s infinite linear; }
        .pulse-v { width: 2px; height: 200px; background: linear-gradient(0deg, transparent, var(--blue), transparent); animation: moveV 6s infinite linear; }

        @keyframes moveH {
            0% { left: -300px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        @keyframes moveV {
            0% { top: -300px; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* UI Overlays */
        #main { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top); }
        #header { background: rgba(0, 10, 20, 0.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--blue); padding: 15px 20px; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: var(--blue); letter-spacing: 1px; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch; }

        .line { background: rgba(0, 5, 10, 0.9); border-top: 1px solid var(--blue); padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { background: transparent; border: none; color: #fff; font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #room-id { border: 1px solid var(--blue); background: rgba(0,0,0,0.6); text-align: center; margin-bottom: 30px; width: 100%; max-width: 260px; padding: 15px; color: #fff; border-radius: 2px; }
        button { background: var(--blue); color: #fff; border: none; padding: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 260px; text-transform: uppercase; }

        .msg { margin-bottom: 18px; border-left: 1px solid var(--blue); padding-left: 12px; }
        .who { font-size: 10px; color: var(--blue); opacity: 0.8; margin-bottom: 4px; }
        .txt { font-size: 15px; color: #e0f0ff; line-height: 1.4; }
        .self { border-left: 1px solid #fff; }
        .self .who { color: #fff; }
        .log { font-size: 10px; color: #003060; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
<div class="scene">
    <div class="grid-base"></div>
    <!-- Randomized Pulses -->
    <div class="pulse-h" style="top: 160px; animation-delay: 0s;"></div>
    <div class="pulse-h" style="top: 400px; animation-delay: 2s;"></div>
    <div class="pulse-h" style="top: 640px; animation-delay: 1.5s;"></div>
    <div class="pulse-v" style="left: 160px; animation-delay: 0.5s;"></div>
    <div class="pulse-v" style="left: 480px; animation-delay: 3s;"></div>
</div>

<div id="main">
    <div id="header" onclick="reboot()">
        <span>PHOBOS</span>
        <span id="status">STATUS</span>
    </div>
    <div id="setup">
        <input type="text" id="room-id" placeholder="CHANNEL_ID" autocomplete="off" spellcheck="false">
        <button onclick="boot()">Connect</button>
    </div>
    <div id="chat-ui">
        <div id="box" style="display: flex; flex-direction: column;"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="ICN Message..." autocomplete="off">
        </div>
    </div>
</div>

<script type="module">
    import {joinRoom} from 'https://esm.run';
    let room, send, taps = 0;
    const status = document.getElementById('status');
    const box = document.getElementById('box');

    window.reboot = () => { if (++taps >= 3) location.reload(); setTimeout(() => taps = 0, 2000); };

    window.boot = () => {
        const id = document.getElementById('room-id').value.trim();
        if (!id) return;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        status.textContent = "ACTIVE";

        room = joinRoom({appId: 'phobos-icn-protocol'}, id);
        const [sendMessage, receiveMessage] = room.makeAction('chat');
        send = sendMessage;

        room.onPeerJoin(peerId => addLog(`Handshake accepted: ${peerId.slice(0,4)}`));
        receiveMessage((data, peerId) => addMsg(`ICN_${peerId.slice(0,4)}`, data, false));

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                send(e.target.value);
                addMsg("ICN_LOCAL", e.target.value, true);
                e.target.value = '';
            }
        };
    };

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg' + (isSelf ? ' self' : '');
        div.innerHTML = `<div class="who">${id}</div><div class="txt">${text}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'log';
        d.textContent = t;
        box.appendChild(d);
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('main').style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
