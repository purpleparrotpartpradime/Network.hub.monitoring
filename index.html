<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Phobos</title>
    <style>
        :root { 
            --cyan: #00f2ff; 
            --navy: #000a1a; 
            --dark-blue: #001a33; 
            --bg: #00050a;
            --safe-top: env(safe-area-inset-top);
        }
        
        /* The body now stays exactly as tall as the visible screen (above keyboard) */
        body, html { 
            margin: 0; padding: 0; 
            background: var(--bg); 
            color: var(--cyan); 
            font-family: 'Courier New', monospace; 
            height: 100%; width: 100vw;
            overflow: hidden; 
            position: fixed; /* Prevents the whole page from bouncing */
        }
        
        #main { 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            padding-top: var(--safe-top);
        }

        #header { 
            background: var(--navy); 
            border-bottom: 2px solid var(--dark-blue); 
            padding: 15px; 
            text-align: center; 
            font-size: 12px; 
            flex-shrink: 0;
        }

        #setup { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
        }

        #chat-ui { 
            display: none; 
            flex: 1; 
            flex-direction: column; 
            overflow: hidden; 
        }

        #box { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            -webkit-overflow-scrolling: touch; 
        }
        
        .line { 
            display: flex; 
            padding: 15px; 
            background: var(--navy); 
            border-top: 1px solid var(--dark-blue); 
            flex-shrink: 0;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        input { 
            background: transparent; 
            border: none; 
            color: var(--cyan); 
            font-size: 16px; 
            outline: none; 
            width: 100%; 
            font-family: inherit; 
        }

        #port-in { 
            border-bottom: 1px solid var(--cyan); 
            text-align: center; 
            margin-bottom: 30px; 
            width: 70%; 
            padding: 10px;
        }
        
        button { 
            background: var(--cyan); 
            color: #000; 
            border: none; 
            padding: 20px 40px; 
            font-weight: bold; 
            border-radius: 4px;
        }

        .msg-wrap { margin-bottom: 15px; border-left: 2px solid var(--dark-blue); padding-left: 12px; }
        .sender-id { font-size: 10px; color: #555; display: block; margin-bottom: 4px; }
        .msg-text { font-size: 14px; line-height: 1.5; color: #fff; }
        .self { border-left: 2px solid var(--cyan); }
        .sys { color: #444; font-size: 11px; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

<div id="main">
    <div id="header">LINK_ID: <span id="my-id-display">PENDING</span></div>

    <div id="setup">
        <input type="number" id="port-in" placeholder="ID">
        <button onclick="initialize()">OPEN CHANNEL</button>
    </div>

    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="TYPE..." autocomplete="off" autocapitalize="none">
        </div>
    </div>
</div>

<script src="https://unpkg.com"></script>
<script>
    let peer, conn, myPort;
    const box = document.getElementById('box');
    const main = document.getElementById('main');

    // KEYBOARD FIX: Forces the app height to match the visible space
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            main.style.height = window.visualViewport.height + 'px';
            window.scrollTo(0, 0); // Keep the viewport from scrolling away
            box.scrollTop = box.scrollHeight;
        });
    }

    function initialize() {
        myPort = document.getElementById('port-in').value;
        if (!myPort) return;
        peer = new Peer('node-' + myPort);
        peer.on('open', () => {
            document.getElementById('my-id-display').textContent = myPort;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            const request = peer.connect('node-' + myPort);
            if (request) { conn = request; setupLink(); }
        });
        peer.on('connection', (c) => { conn = c; setupLink(); });
        peer.on('error', (err) => { if (err.type === 'id-taken') { alert("ID TAKEN"); location.reload(); } });
    }

    function setupLink() {
        conn.on('data', data => addMsg(myPort, data, false));
        conn.on('open', () => addLog("CONNECTED"));
    }

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg-wrap' + (isSelf ? ' self' : '');
        div.innerHTML = `<span class="sender-id">ID: ${id}</span><span class="msg-text">${text}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'sys';
        d.textContent = ">> " + t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-in').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && conn) {
            const m = e.target.value;
            if (!m) return;
            conn.send(m);
            addMsg(myPort, m, true);
            e.target.value = '';
        }
    });
</script>
</body>
</html>
