<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Phobos Aero</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.25);
            --liquid: rgba(255, 255, 255, 0.4);
            --aero-blue: #0088ff;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: "Segoe UI", "Tahoma", sans-serif;
            overflow: hidden; background: #004a99;
        }

        /* --- Dynamic Frutiger Background --- */
        .aero-bg {
            position: fixed; inset: 0; z-index: -1;
            background: linear-gradient(to bottom, #0072ff, #00c6ff);
            overflow: hidden;
        }

        /* Realistic Water Waves at Bottom */
        .water {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .wave {
            position: absolute; bottom: 0; left: 0; width: 200%; height: 100%;
            background: url('https://ibb.co') repeat-x;
            background-size: 50% 100%;
            opacity: 0.3;
            animation: waveFlow 10s linear infinite;
        }
        .wave.top { opacity: 0.5; animation-duration: 7s; height: 80%; bottom: 10px; }

        @keyframes waveFlow {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* Floating Bubbles */
        .bubble {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent);
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(0,136,255,0.3);
            animation: float 15s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            50% { transform: translateY(-100px) translateX(20px); }
        }

        /* --- Layout --- */
        #main { display: flex; flex-direction: column; height: 100vh; padding-top: env(safe-area-inset-top); }

        /* Userbar Header */
        #header {
            width: 100%; height: 60px; flex-shrink: 0;
            background: url('https://githubusercontent.com') no-repeat center;
            background-size: contain; border-bottom: 1px solid rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
        }

        /* Setup Panel */
        #setup {
            flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; padding: 20px;
        }

        .liquid-glass {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px; backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 0 15px rgba(255,255,255,0.3);
            padding: 15px; color: white; width: 80%; max-width: 300px; text-align: center;
        }

        input {
            width: 90%; background: rgba(0,0,0,0.1); border: 1px solid white;
            padding: 10px; border-radius: 10px; color: white; outline: none; margin-bottom: 10px;
        }

        button {
            background: linear-gradient(#7abcff, #4096ee); color: white;
            border: 1px solid white; padding: 12px 25px; border-radius: 20px;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Chat UI */
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }

        /* Liquid Glass Bubbles */
        .msg-wrap {
            max-width: 75%; padding: 12px 18px; border-radius: 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: inset 0 0 10px rgba(255,255,255,0.2), 0 5px 15px rgba(0,0,0,0.1);
            color: #fff; position: relative;
        }
        .msg-wrap.self { align-self: flex-end; background: rgba(0, 136, 255, 0.3); border-color: rgba(0, 136, 255, 0.5); }
        .sender { font-size: 10px; font-weight: bold; opacity: 0.7; margin-bottom: 4px; text-transform: uppercase; }

        #footer {
            padding: 15px; background: rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(15px);
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }
    </style>
</head>
<body>

<div class="aero-bg">
    <div class="sun"></div>
    <div class="bubble" style="width:80px; height:80px; left:10%; top:20%;"></div>
    <div class="bubble" style="width:40px; height:40px; left:80%; top:40%; animation-delay: 2s;"></div>
    <div class="bubble" style="width:100px; height:100px; left:60%; top:70%; animation-delay: 5s;"></div>
    <div class="water">
        <div class="wave"></div>
        <div class="wave top"></div>
    </div>
</div>

<div id="main">
    <div id="header"></div>
    
    <div id="setup">
        <div class="liquid-glass">
            <input type="text" id="id-in" placeholder="CHANNEL ID" autocomplete="off">
            <input type="text" id="name-in" placeholder="YOUR NAME" autocomplete="off">
            <button onclick="boot()">Connect</button>
        </div>
    </div>

    <div id="chat-ui">
        <div id="box"></div>
        <div id="footer">
            <input type="text" id="msg-in" placeholder="Type a message..." autocomplete="off" style="width: 100%; margin:0;">
        </div>
    </div>
</div>

<script type="module">
    import { joinRoom } from 'https://esm.run';

    let room, send, myName;
    const box = document.getElementById('box');

    window.boot = () => {
        const id = document.getElementById('id-in').value.trim();
        myName = document.getElementById('name-in').value.trim() || 'Anonymous';
        if (!id) return;

        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';

        // Connect via Nostr relays
        room = joinRoom({appId: 'phobos-liquid-aero'}, id);
        const [sendMessage, receiveMessage] = room.makeAction('chat');
        send = sendMessage;

        receiveMessage((data, peerId) => {
            addMsg(data.name, data.text, false);
        });

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                const text = e.target.value;
                send({ name: myName, text: text });
                addMsg(myName, text, true);
                e.target.value = '';
            }
        };
    };

    function addMsg(name, text, isSelf) {
        const wrap = document.createElement('div');
        wrap.className = 'msg-wrap' + (isSelf ? ' self' : '');
        wrap.innerHTML = `<div class="sender">${name}</div><div class="text">${text}</div>`;
        box.appendChild(wrap);
        box.scrollTop = box.scrollHeight;
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('main').style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
