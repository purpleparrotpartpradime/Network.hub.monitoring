<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SEC_OPS_v3</title>
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        :root { --blue: #00f2ff; --bg: #000; --panel: #0a0a0a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--blue); font-family: 'Consolas', monospace; height: 100vh; overflow: hidden; }
        #container { display: flex; flex-direction: column; height: 100%; }
        nav { display: flex; background: #111; border-bottom: 2px solid var(--blue); }
        .tab { flex: 1; padding: 15px; text-align: center; cursor: pointer; font-size: 10px; letter-spacing: 1px; border-right: 1px solid #222; text-transform: uppercase; }
        .tab.active { background: var(--blue); color: #000; font-weight: bold; }
        .panel { display: none; flex: 1; overflow-y: auto; padding: 20px; position: relative; }
        .panel.active { display: flex; flex-direction: column; }
        #terminal-output, #chat-box { white-space: pre-wrap; font-size: 13px; line-height: 1.4; margin-bottom: 10px; flex: 1; overflow-y: auto; }
        .input-line { display: flex; align-items: center; border-top: 1px solid #111; padding-top: 10px; }
        .prompt { color: #fff; margin-right: 10px; font-weight: bold; }
        input { background: transparent; border: none; color: var(--blue); font-family: inherit; font-size: 14px; outline: none; width: 100%; }
        #map { height: 100%; width: 100%; filter: invert(100%) hue-rotate(180deg) brightness(0.7); }
        .log { font-size: 11px; color: #0088ff; border-left: 1px solid #333; padding-left: 8px; margin-bottom: 4px; }
        #msg-init { text-align: center; margin-top: 20%; }
        .btn { background: var(--blue); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div id="container">
    <nav>
        <div class="tab active" onclick="showTab('term')">Console</div>
        <div class="tab" onclick="showTab('sat')">Sat-View</div>
        <div class="tab" onclick="showTab('net')">Net-Logs</div>
        <div class="tab" onclick="showTab('msg')">Messages</div>
    </nav>

    <div id="term" class="panel active">
        <div id="terminal-output">SYS_AUTH_SUCCESS: ENCRYPTED SESSION ACTIVE...
Type 'help' for commands.</div>
        <div class="input-line">
            <span class="prompt">root@local:~#</span>
            <input type="text" id="cmd-input" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>

    <div id="sat" class="panel"><div id="map"></div></div>

    <div id="net" class="panel"><div id="log-feed"></div></div>

    <div id="msg" class="panel">
        <div id="msg-init">
            <p>ENTER TARGET PORT (ROOM ID):</p>
            <input type="number" id="room-input" placeholder="8080" style="border: 1px solid var(--blue); width: 60%; text-align: center; padding: 5px;">
            <br><button class="btn" onclick="startChat()">INITIALIZE P2P</button>
        </div>
        <div id="chat-interface" style="display:none; flex-direction:column; height:100%;">
            <div id="chat-box"></div>
            <div class="input-line">
                <span class="prompt">MSG></span>
                <input type="text" id="chat-input" placeholder="Secure transmission..." autocomplete="off">
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com"></script>
<script src="https://unpkg.com"></script>
<script>
    const input = document.getElementById('cmd-input');
    const output = document.getElementById('terminal-output');
    let map, peer, conn;
    const banned = ['badword1', 'badword2']; // Add real words you want to block

    const commands = {
        'help': 'CMDS: scan, nmap, dig [host], status, whoami, clear',
        'whoami': () => `PLATFORM: ${navigator.platform}\nMEM: ${navigator.deviceMemory}GB\nCORES: ${navigator.hardwareConcurrency}`,
        'clear': () => { output.innerHTML = 'SYSTEM READY...'; return ''; },
        'status': () => `CONN: ${navigator.onLine ? 'ONLINE' : 'OFFLINE'}\nUPLINK: STABLE`,
        'scan': async () => {
            print("FETCHING EXTERNAL FOOTPRINT...");
            const res = await fetch('https://ipapi.co');
            const d = await res.json();
            return `IP: ${d.ip}\nASN: ${d.asn}\nORG: ${d.org}\nLOC: ${d.city}, ${d.country_name}`;
        },
        'dig': async (args) => {
            if(!args[0]) return "ERR: NO HOST";
            print(`RESOLVING DNS FOR ${args[0]}...`);
            const res = await fetch(`https://dns.google{args[0]}`);
            const d = await res.json();
            return d.Answer ? d.Answer.map(a => `[TYPE ${a.type}] ${a.data}`).join('\n') : "NXDOMAIN";
        },
        'nmap': async () => {
            const ports = [80, 443, 8080, 3000];
            print("PROBING LOCALHOST TCP STACK...");
            let res = [];
            for(let p of ports) {
                const ctrl = new AbortController();
                const tid = setTimeout(() => ctrl.abort(), 300);
                try {
                    await fetch(`http://localhost:${p}`, { mode: 'no-cors', signal: ctrl.signal });
                    res.push(`PORT ${p}: OPEN`);
                } catch(e) { res.push(`PORT ${p}: FILTERED`); }
                clearTimeout(tid);
            }
            return res.join('\n');
        }
    };

    input.addEventListener('keydown', async (e) => {
        if (e.key === 'Enter') {
            const [cmd, ...args] = input.value.toLowerCase().trim().split(' ');
            print(`root@local:~# ${input.value}`, '#fff');
            input.value = '';
            if (commands[cmd]) {
                const result = typeof commands[cmd] === 'function' ? await commands[cmd](args) : commands[cmd];
                if(result) print(result);
            } else print(`bash: ${cmd}: command not found`, '#ff4d4d');
            document.getElementById('term').scrollTop = document.getElementById('term').scrollHeight;
        }
    });

    function print(t, c) {
        const d = document.createElement('div');
        d.style.color = c || 'var(--blue)';
        d.textContent = t;
        output.appendChild(d);
    }

    function showTab(id) {
        document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'sat') loadMap();
    }

    function loadMap() {
        if(!map) {
            map = L.map('map').setView([0,0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            navigator.geolocation.getCurrentPosition(p => {
                const pos = [p.coords.latitude, p.coords.longitude];
                map.setView(pos, 15);
                L.circle(pos, {radius: 200, color: '#00f2ff', fillOpacity: 0.1}).addTo(map);
            });
        }
    }

    // --- MESSAGES LOGIC ---
    function startChat() {
        const id = document.getElementById('room-input').value;
        if(!id) return;
        peer = new Peer('room-' + id);
        peer.on('open', () => {
            document.getElementById('msg-init').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'flex';
            addChatLog("SYS", "CONNECTED TO PORT " + id, "#aaa");
        });
        peer.on('connection', (c) => {
            conn = c;
            setupConn();
        });
        const out = peer.connect('room-' + id);
        if(out) { conn = out; setupConn(); }
    }

    function setupConn() {
        conn.on('data', data => addChatLog("REMOTE", censor(data), varColor('--blue')));
    }

    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if(e.key === 'Enter' && conn) {
            const m = e.target.value;
            conn.send(m);
            addChatLog("YOU", censor(m), "#fff");
            e.target.value = '';
        }
    });

    function censor(t) {
        let s = t;
        banned.forEach(w => { s = s.replace(new RegExp(w, 'gi'), '****'); });
        return s;
    }

    function addChatLog(u, m, c) {
        const b = document.getElementById('chat-box');
        const d = document.createElement('div');
        d.innerHTML = `<span style="color:${c}">[${u}]</span> ${m}`;
        b.appendChild(d);
        b.scrollTop = b.scrollHeight;
    }

    function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n); }

    // --- NET LOGS ---
    const logFeed = document.getElementById('log-feed');
    window.addEventListener('online', () => addLog("INTERFACE_UP: Network restored"));
    window.addEventListener('offline', () => addLog("INTERFACE_DOWN: Lost connection"));
    function addLog(msg) {
        const d = document.createElement('div');
        d.className = 'log';
        d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logFeed.prepend(d);
    }
</script>
</body>
</html>
