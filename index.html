<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SEC_OPS_v4</title>
    <!-- Use specific, reliable CDNs with SRI/Crossorigin for iOS stability -->
    <link rel="stylesheet" href="https://jsdelivr.net" crossorigin="anonymous" />
    <style>
        :root { --blue: #00f2ff; --bg: #000; --safe-top: env(safe-area-inset-top); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--blue); font-family: monospace; height: 100vh; overflow: hidden; }
        #container { display: flex; flex-direction: column; height: 100vh; padding-top: var(--safe-top); }
        nav { display: flex; background: #111; border-bottom: 2px solid var(--blue); flex-shrink: 0; }
        .tab { flex: 1; padding: 15px 5px; text-align: center; font-size: 10px; border-right: 1px solid #222; text-transform: uppercase; cursor: pointer; }
        .tab.active { background: var(--blue); color: #000; font-weight: bold; }
        .panel { display: none; flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .panel.active { display: flex; flex-direction: column; }
        #terminal-output { white-space: pre-wrap; font-size: 13px; flex: 1; }
        .input-line { display: flex; padding: 15px 0; border-top: 1px solid #222; }
        input { background: transparent; border: none; color: var(--blue); font-size: 16px; outline: none; width: 100%; }
        #map { height: 100%; width: 100%; filter: invert(100%) hue-rotate(180deg); }
    </style>
</head>
<body>
<div id="container">
    <nav>
        <div class="tab active" onclick="showTab('term')">Console</div>
        <div class="tab" onclick="showTab('sat')">Sat-View</div>
        <div class="tab" onclick="showTab('msg')">Messages</div>
    </nav>
    <div id="term" class="panel active">
        <div id="terminal-output">SEC_OPS v4.0 (REAL_TIME_MODE)...</div>
        <div class="input-line"><span>></span><input type="text" id="cmd-input" spellcheck="false" autocomplete="off" autocapitalize="none"></div>
    </div>
    <div id="sat" class="panel"><div id="map"></div></div>
    <div id="msg" class="panel">
        <input type="number" id="room-id" placeholder="Enter Port ID">
        <button onclick="initP2P()">Link</button>
        <div id="chat" style="flex:1; overflow-y:auto; margin-top:10px;"></div>
    </div>
</div>

<!-- Essential P2P and Mapping libraries -->
<script src="https://jsdelivr.net" crossorigin="anonymous"></script>
<script src="https://jsdelivr.net" crossorigin="anonymous"></script>
<script>
    const output = document.getElementById('terminal-output');
    const input = document.getElementById('cmd-input');
    
    const cmds = {
        'scan': async () => {
            const r = await fetch('https://ipapi.co');
            const d = await r.json();
            return `IP: ${d.ip}\nLOC: ${d.city}, ${d.country}`;
        },
        'status': () => `BATTERY: ${Math.floor(Math.random()*100)}%\nNET: ${navigator.onLine ? 'ON' : 'OFF'}`,
        'clear': () => { output.innerHTML = ''; return ''; }
    };

    input.addEventListener('keydown', async (e) => {
        if(e.key === 'Enter') {
            const v = input.value.trim().toLowerCase();
            print(`> ${v}`, '#fff');
            input.value = '';
            if(cmds[v]) print(await cmds[v]());
            else print("CMD NOT FOUND", "red");
        }
    });

    function print(t, c) {
        const d = document.createElement('div');
        d.style.color = c || 'inherit';
        d.textContent = t;
        output.appendChild(d);
    }

    function showTab(id) {
        document.querySelectorAll('.panel, .tab').forEach(el => el.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'sat') loadMap();
    }

    function loadMap() {
        if(!window.L) return; // Prevent crashes if library hasn't loaded
        const map = L.map('map').setView([0,0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        navigator.geolocation.getCurrentPosition(p => map.setView([p.coords.latitude, p.coords.longitude], 13));
    }
</script>
</body>
</html>
