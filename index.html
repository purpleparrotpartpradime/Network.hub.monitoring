<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos Core</title>
    <style>
        :root { 
            --trace: #002d5a; 
            --glow: #00a2ff; 
            --bg: #00050a; 
            --panel: rgba(0, 15, 30, 0.85);
        }
        
        body, html { 
            margin: 0; padding: 0; background: var(--bg); 
            color: #fff; font-family: "SF Mono", "Menlo", monospace; 
            height: 100%; width: 100%; overflow: hidden; position: fixed;
        }

        /* Circuit Board Background Pattern */
        .circuit-bg {
            position: fixed; inset: 0; z-index: -1;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 2px 2px, var(--trace) 1px, transparent 0);
            background-size: 40px 40px;
            opacity: 0.4;
        }
        .circuit-bg::after {
            content: ""; position: absolute; inset: 0;
            background-image: linear-gradient(var(--trace) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--trace) 1px, transparent 1px);
            background-size: 100px 100px;
            mask-image: radial-gradient(circle, black, transparent 80%);
        }

        #main { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top); }
        
        #header { 
            background: var(--panel); border-bottom: 1px solid var(--trace); 
            padding: 15px 20px; display: flex; justify-content: space-between; 
            font-size: 11px; letter-spacing: 1px; color: var(--glow);
        }

        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        
        #box { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }

        .line { 
            background: var(--panel); border-top: 1px solid var(--trace); 
            padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        input { 
            background: transparent; border: none; color: #fff; 
            font-size: 16px; outline: none; width: 100%; font-family: inherit; 
        }

        #room-id { 
            border: 1px solid var(--trace); background: rgba(0,0,0,0.5);
            text-align: center; margin-bottom: 25px; width: 100%; 
            max-width: 260px; padding: 15px; color: var(--glow);
            box-shadow: 0 0 15px rgba(0, 162, 255, 0.1);
        }

        button { 
            background: var(--glow); color: #000; border: none; 
            padding: 15px 30px; font-weight: bold; border-radius: 2px; 
            cursor: pointer; width: 100%; max-width: 260px;
            box-shadow: 0 0 10px var(--glow);
        }

        .msg { margin-bottom: 15px; border-left: 2px solid var(--trace); padding-left: 12px; }
        .who { font-size: 9px; color: var(--glow); opacity: 0.7; margin-bottom: 4px; }
        .txt { font-size: 14px; line-height: 1.5; color: #e0eefb; word-break: break-all; }
        .self { border-left-color: var(--glow); }
        .log { font-size: 10px; color: var(--trace); text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
<div class="circuit-bg"></div>
<div id="main">
    <div id="header" onclick="reboot()">
        <span>PHOBOS CORE v3.0</span>
        <span id="status">OFFLINE</span>
    </div>
    
    <div id="setup">
        <input type="text" id="room-id" placeholder="Channel Key" autocomplete="off" spellcheck="false">
        <button onclick="boot()">Access Network</button>
    </div>

    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="Type message..." autocomplete="off">
        </div>
    </div>
</div>

<script type="module">
    import {joinRoom} from 'https://esm.run';

    let room, send, taps = 0;
    const status = document.getElementById('status');
    const box = document.getElementById('box');

    window.reboot = () => {
        taps++;
        if (taps >= 3) location.reload();
        setTimeout(() => taps = 0, 2000);
    };

    window.boot = () => {
        const id = document.getElementById('room-id').value.trim();
        if (!id) return;

        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        status.textContent = "SYNCING";

        room = joinRoom({appId: 'phobos-circuit-v3'}, id);
        const [sendMessage, receiveMessage] = room.makeAction('chat');
        send = sendMessage;

        room.onPeerJoin(peerId => {
            status.textContent = "ENCRYPTED";
            addLog(`Link established with ${peerId.slice(0,4)}`);
        });

        room.onPeerLeave(() => {
            if (Object.keys(room.getPeers()).length === 0) status.textContent = "SEARCHING";
        });

        receiveMessage((data, peerId) => {
            addMsg(`User ${peerId.slice(0,4)}`, data, false);
        });

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                send(e.target.value);
                addMsg("Local", e.target.value, true);
                e.target.value = '';
            }
        };
    };

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg' + (isSelf ? ' self' : '');
        div.innerHTML = `<div class="who">${id}</div><div class="txt">${text}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'log';
        d.textContent = t;
        box.appendChild(d);
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('main').style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
