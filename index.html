<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos X</title>
    <style>
        :root { --glow: #00f2ff; --bg: #00050a; --navy: #000a1a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--glow); font-family: 'Courier New', monospace; height: 100%; overflow: hidden; position: fixed; width: 100%; }
        #main { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top); }
        #header { background: var(--navy); border-bottom: 1px solid #001a33; padding: 12px; text-align: center; font-size: 10px; letter-spacing: 2px; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .line { background: var(--navy); padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid #001a33; }
        input { background: transparent; border: none; color: #fff; font-size: 16px; outline: none; width: 100%; font-family: inherit; border-radius: 0; }
        #room-in { border-bottom: 2px solid var(--glow); text-align: center; margin-bottom: 30px; width: 70%; padding: 10px; }
        button { background: var(--glow); color: #000; border: none; padding: 18px 40px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 2px; width: 70%; }
        .msg { margin-bottom: 12px; font-size: 14px; animation: slide 0.1s ease-out; }
        .id { font-size: 9px; opacity: 0.4; margin-bottom: 2px; display: block; }
        .text { color: #fff; line-height: 1.4; word-break: break-all; }
        .self { border-left: 2px solid var(--glow); padding-left: 10px; }
        .sys { font-size: 10px; color: #333; text-align: center; margin: 15px 0; font-style: italic; }
        @keyframes slide { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
<div id="main">
    <div id="header">CORE_STATUS: <span id="stat">STBY</span></div>
    <div id="setup">
        <input type="text" id="room-in" placeholder="CHANNEL_ID" autocomplete="off">
        <button onclick="start()">JOIN_NETWORK</button>
    </div>
    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="WRITE_PACKET..." autocomplete="off">
        </div>
    </div>
</div>

<!-- Fast Decentralized Matchmaking Library -->
<script src="https://unpkg.com"></script>

<script>
    let room, send;
    const box = document.getElementById('box');
    const stat = document.getElementById('stat');

    function start() {
        const roomId = document.getElementById('room-in').value.trim();
        if (!roomId) return;

        // joinRoom uses BitTorrent trackers for high-speed P2P discovery
        room = window.trystero.joinRoom({appId: 'phobos-x-terminal'}, roomId);
        [send] = room.makeAction('chat');

        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        stat.textContent = "SEARCHING...";

        // Handlers for real-time events
        room.onPeerJoin(id => {
            stat.textContent = "CONNECTED";
            addLog(`PEER_${id.slice(0,4)}_FOUND`);
        });

        room.onPeerLeave(id => {
            if (Object.keys(room.getPeers()).length === 0) stat.textContent = "SEARCHING...";
            addLog(`PEER_${id.slice(0,4)}_LOST`);
        });

        room.onData((data, peerId) => {
            addMsg(`REMOTE_${peerId.slice(0,4)}`, data, false);
        });

        addLog("DECENTRALIZED_CHANNEL_OPEN");
    }

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg' + (isSelf ? ' self' : '');
        div.innerHTML = `<span class="id">${id}</span><span class="text">${text}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'sys';
        d.textContent = ">> " + t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-in').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            send(e.target.value);
            addMsg("LOCAL_USER", e.target.value, true);
            e.target.value = '';
        }
    });

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('main').style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
