<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PHOBOS_v2</title>
    <style>
        :root { --accent: #00ff41; --bg: #000; --dim: #003300; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--accent); font-family: 'Courier New', monospace; height: 100%; overflow: hidden; position: fixed; width: 100%; }
        #main { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top); }
        #header { background: #080808; border-bottom: 1px solid var(--dim); padding: 15px; text-align: center; font-size: 10px; letter-spacing: 3px; cursor: crosshair; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .line { background: #080808; padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid var(--dim); display: flex; }
        input { background: transparent; border: none; color: #fff; font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #room-id { border-bottom: 1px solid var(--accent); text-align: center; margin-bottom: 30px; width: 80%; padding: 10px; border-radius: 0; }
        button { background: var(--accent); color: #000; border: none; padding: 15px 40px; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 80%; }
        .msg { margin-bottom: 15px; border-left: 1px solid var(--dim); padding-left: 10px; animation: blink 0.1s ease-in; }
        .who { font-size: 9px; opacity: 0.5; display: block; margin-bottom: 3px; }
        .txt { color: #fff; line-height: 1.4; word-break: break-all; }
        .sys { font-size: 10px; color: #333; text-align: center; margin: 15px 0; }
        @keyframes blink { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
<div id="main">
    <div id="header" onclick="nukeCount()">PHOBOS_OS // <span id="stat">STBY</span></div>
    
    <div id="setup">
        <input type="text" id="room-id" placeholder="ENTER_SYNC_KEY" autocomplete="off" spellcheck="false">
        <button onclick="boot()">SECURE_CONNECT</button>
        <p style="font-size: 9px; margin-top: 20px; color: #222;">P2P_NOSTR_ENCRYPTION_ACTIVE</p>
    </div>

    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <span>>&nbsp;</span>
            <input type="text" id="msg-in" placeholder="ENCRYPTING..." autocomplete="off">
        </div>
    </div>
</div>

<script type="module">
    import {joinRoom} from 'https://esm.run';

    let room, send, taps = 0;
    const stat = document.getElementById('stat');
    const box = document.getElementById('box');

    // Triple tap header to wipe everything
    window.nukeCount = () => {
        taps++;
        if (taps >= 3) location.reload();
        setTimeout(() => taps = 0, 2000);
    };

    window.boot = () => {
        const id = document.getElementById('room-id').value.trim();
        if (!id) return;

        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        stat.textContent = "SYNCING";

        // Join decentralized Nostr relays
        room = joinRoom({appId: 'phobos-terminal-v2'}, id);
        const [sendMessage, receiveMessage] = room.makeAction('chat');
        send = sendMessage;

        room.onPeerJoin(peerId => {
            stat.textContent = "LINK_ACTIVE";
            addLog(`HANDSHAKE_COMPLETE: ${peerId.slice(0,6)}`);
        });

        room.onPeerLeave(peerId => {
            if (Object.keys(room.getPeers()).length === 0) stat.textContent = "SYNCING";
            addLog(`LINK_TERMINATED: ${peerId.slice(0,6)}`);
        });

        receiveMessage((data, peerId) => {
            addMsg(`REMOTE_${peerId.slice(0,4)}`, data, false);
        });

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                send(e.target.value);
                addMsg("LOCAL_USER", e.target.value, true);
                e.target.value = '';
            }
        };
    };

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg';
        if (isSelf) div.style.borderColor = 'var(--accent)';
        div.innerHTML = `<span class="who">${id}</span><span class="txt">${text}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'sys';
        d.textContent = ">> " + t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    // Viewport hack for mobile keyboards
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('main').style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
