<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos Terminal</title>
    
    <style>
        :root { --cyan: #00f2ff; --navy: #000a1a; --dark-blue: #001a33; --bg: #00050a; --safe-top: env(safe-area-inset-top); }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--cyan); font-family: 'Courier New', monospace; height: 100%; width: 100vw; overflow: hidden; position: fixed; }
        #main { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }
        #header { background: var(--navy); border-bottom: 2px solid var(--dark-blue); padding: 15px; text-align: center; font-size: 11px; flex-shrink: 0; letter-spacing: 2px; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
        .line { display: flex; padding: 15px; background: var(--navy); border-top: 1px solid var(--dark-blue); flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { background: transparent; border: none; color: var(--cyan); font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #port-in { border: none; border-bottom: 2px solid var(--cyan); text-align: center; margin-bottom: 40px; width: 70%; padding: 10px; border-radius: 0; background: rgba(0,242,255,0.05); }
        .btn-row { display: flex; gap: 15px; width: 100%; max-width: 350px; }
        button { flex: 1; background: var(--cyan); color: #000; border: none; padding: 18px 0; font-weight: bold; border-radius: 2px; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        button:active { opacity: 0.7; scale: 0.98; }
        .btn-alt { background: transparent; color: var(--cyan); border: 1px solid var(--cyan); }
        .msg-wrap { margin-bottom: 12px; border-left: 2px solid var(--dark-blue); padding-left: 12px; animation: fadeIn 0.2s; }
        .sender-id { font-size: 9px; color: #555; display: block; margin-bottom: 2px; }
        .msg-text { font-size: 14px; line-height: 1.4; color: #fff; word-break: break-all; }
        .self { border-left: 2px solid var(--cyan); }
        .sys { color: #333; font-size: 10px; text-align: center; margin: 10px 0; font-style: italic; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-5px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>
<div id="main">
    <div id="header">COMM_LINK: <span id="my-id-display">OFFLINE</span></div>
    <div id="setup">
        <input type="number" id="port-in" placeholder="PORT_ID" pattern="\d*">
        <div class="btn-row">
            <button onclick="initialize(false)">INITIALIZE</button>
            <button onclick="initialize(true)" class="btn-alt">LINK_SYNC</button>
        </div>
    </div>
    <div id="chat-ui">
        <div id="box"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="UPLOAD_PACKET..." autocomplete="off" autocapitalize="none">
        </div>
    </div>
</div>

<!-- Stable PeerJS CDN -->
<script src="https://jsdelivr.net"></script>

<script>
    let peer, conn, myPort;
    const box = document.getElementById('box');
    const main = document.getElementById('main');

    // Viewport fix for mobile keyboards
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            main.style.height = window.visualViewport.height + 'px';
            box.scrollTop = box.scrollHeight;
        });
    }

    function initialize(isLinkOnly) {
        myPort = document.getElementById('port-in').value;
        if (!myPort) return;
        
        // Host ID is node-XXXX, Guest ID is randomized to avoid conflicts
        const nodeId = isLinkOnly ? 'phobos-guest-' + Math.floor(Math.random()*9999) : 'phobos-node-' + myPort;
        
        peer = new Peer(nodeId, {
            debug: 1,
            config: {'iceServers': [
                { urls: 'stun:://google.com' },
                { urls: 'stun:://google.com' }
            ]}
        });

        peer.on('open', (id) => {
            addLog("P2P_SIGNAL_ACTIVE");
            document.getElementById('my-id-display').textContent = isLinkOnly ? "SYNCING..." : "HOSTING:" + myPort;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'flex';
            
            if (isLinkOnly) {
                // Brief delay to ensure server registration
                setTimeout(() => {
                    conn = peer.connect('phobos-node-' + myPort, { reliable: true });
                    setupLink();
                }, 500);
            }
        });

        peer.on('connection', (c) => { 
            conn = c; 
            setupLink(); 
        });

        peer.on('error', (err) => { 
            addLog("ERR: " + err.type.toUpperCase());
            if(err.type === 'peer-unavailable') alert("HOST NOT FOUND");
            if(err.type === 'id-taken') alert("PORT BUSY");
        });
    }

    function setupLink() {
        if(!conn) return;

        conn.on('open', () => {
            addLog("SECURE_CHANNEL_READY");
            document.getElementById('my-id-display').textContent = "LINK_ESTABLISHED";
        });

        conn.on('data', data => addMsg("REMOTE", data, false));
        
        conn.on('close', () => {
            addLog("CONNECTION_LOST");
            document.getElementById('my-id-display').textContent = "OFFLINE";
        });
    }

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg-wrap' + (isSelf ? ' self' : '');
        div.innerHTML = `<span class="sender-id">${id}</span><span class="msg-text">${text}</span>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'sys';
        d.textContent = ">> " + t;
        box.appendChild(d);
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-in').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && conn && e.target.value.trim() !== "") {
            conn.send(e.target.value);
            addMsg("LOCAL", e.target.value, true);
            e.target.value = '';
        }
    });
</script>
</body>
</html>
