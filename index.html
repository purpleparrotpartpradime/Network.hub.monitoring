<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Phobos</title>
    <style>
        :root { --blue: #003366; --active: #0088ff; --bg: #00040a; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: #fff; font-family: "SF Mono", "Menlo", monospace; height: 100%; width: 100%; overflow: hidden; position: fixed; }

        .scene { position: fixed; inset: 0; z-index: -1; background: var(--bg); }
        
        /* Static Dark Grid */
        .grid-base {
            position: absolute; inset: -100px;
            background-image: 
                linear-gradient(var(--blue) 1px, transparent 1px),
                linear-gradient(90deg, var(--blue) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0.2;
        }

        #bgCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }

        #main { display: flex; flex-direction: column; height: 100%; padding-top: env(safe-area-inset-top); }
        #header { background: rgba(0, 5, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--blue); padding: 16px 22px; display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: var(--active); letter-spacing: 2px; }
        #setup { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        #chat-ui { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #box { flex: 1; overflow-y: auto; padding: 25px; -webkit-overflow-scrolling: touch; }

        .line { background: rgba(0, 0, 0, 0.9); border-top: 1px solid var(--blue); padding: 15px; padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        input { background: transparent; border: none; color: #fff; font-size: 16px; outline: none; width: 100%; font-family: inherit; }
        #room-id { border: 1px solid var(--blue); background: rgba(0,0,0,0.5); text-align: center; margin-bottom: 30px; width: 100%; max-width: 260px; padding: 14px; color: #fff; border-radius: 0; }
        button { background: var(--blue); color: #fff; border: none; padding: 16px; font-weight: bold; cursor: pointer; width: 100%; max-width: 260px; text-transform: uppercase; }

        .msg { margin-bottom: 20px; border-left: 1px solid var(--blue); padding-left: 14px; }
        .who { font-size: 10px; color: var(--active); margin-bottom: 4px; font-weight: bold; }
        .txt { font-size: 15px; color: #d0e0ff; line-height: 1.5; }
        .self { border-left-color: #fff; }
        .log { font-size: 10px; color: #002244; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
<div class="scene">
    <div class="grid-base"></div>
    <canvas id="bgCanvas"></canvas>
</div>

<div id="main">
    <div id="header" onclick="reboot()">
        <span>PHOBOS</span>
        <span id="status">STATUS</span>
    </div>
    <div id="setup">
        <input type="text" id="room-id" placeholder="CHANNEL_ID" autocomplete="off" spellcheck="false">
        <button onclick="boot()">Connect</button>
    </div>
    <div id="chat-ui">
        <div id="box" style="display: flex; flex-direction: column;"></div>
        <div class="line">
            <input type="text" id="msg-in" placeholder="ICN Message..." autocomplete="off">
        </div>
    </div>
</div>

<script type="module">
    import { joinRoom } from 'https://esm.run';

    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    const gridSize = 80;
    let pulses = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    class DataPulse {
        constructor() { this.init(); }
        init() {
            this.isVert = Math.random() > 0.5;
            this.track = Math.floor(Math.random() * (this.isVert ? window.innerWidth : window.innerHeight) / gridSize) * gridSize;
            this.progress = -0.2;
            this.speed = 0.002 + Math.random() * 0.004;
            this.len = 0.1 + Math.random() * 0.15;
        }
        update() {
            this.progress += this.speed;
            if (this.progress > 1.2) this.init();
        }
        draw() {
            const alpha = Math.sin(this.progress * Math.PI);
            ctx.strokeStyle = `rgba(0, 136, 255, ${alpha * 0.5})`;
            ctx.lineWidth = 2;
            ctx.beginPath();
            if (this.isVert) {
                ctx.moveTo(this.track, (this.progress - this.len) * canvas.height);
                ctx.lineTo(this.track, this.progress * canvas.height);
            } else {
                ctx.moveTo((this.progress - this.len) * canvas.width, this.track);
                ctx.lineTo(this.progress * canvas.width, this.track);
            }
            ctx.stroke();
        }
    }

    for (let i = 0; i < 10; i++) pulses.push(new DataPulse());

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pulses.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(render);
    }

    window.addEventListener('resize', resize);
    resize();
    render();

    // App Functionality
    let room, send, taps = 0;
    const status = document.getElementById('status');
    const box = document.getElementById('box');

    window.reboot = () => { if (++taps >= 3) location.reload(); setTimeout(() => taps = 0, 2000); };

    window.boot = () => {
        const id = document.getElementById('room-id').value.trim();
        if (!id) return;
        document.getElementById('setup').style.display = 'none';
        document.getElementById('chat-ui').style.display = 'flex';
        status.textContent = "ACTIVE";

        room = joinRoom({appId: 'phobos-icn-protocol'}, id);
        const [sendMessage, receiveMessage] = room.makeAction('chat');
        send = sendMessage;

        room.onPeerJoin(peerId => addLog(`ICN Session started: ${peerId.slice(0,4)}`));
        receiveMessage((data, peerId) => addMsg(`ICN_${peerId.slice(0,4)}`, data, false));

        document.getElementById('msg-in').onkeydown = e => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                send(e.target.value);
                addMsg("ICN_LOCAL", e.target.value, true);
                e.target.value = '';
            }
        };
    };

    function addMsg(id, text, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg' + (isSelf ? ' self' : '');
        div.innerHTML = `<div class="who">${id}</div><div class="txt">${text}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addLog(t) {
        const d = document.createElement('div');
        d.className = 'log';
        d.textContent = t;
        box.appendChild(d);
    }
</script>
</body>
</html>
